<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #102a43; }
      .subtitle { font: 500 18px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #486581; }
      .section { font: 700 22px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #102a43; }
      .boxTitle { font: 700 20px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #102a43; }
      .boxText { font: 500 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #243b53; }
      .small { font: 500 14px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #486581; }
      .legend { font: 600 16px "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; fill: #102a43; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#486581"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#bcccdc" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f7fafc"/>

  <text x="60" y="70" class="title">当前项目进展图：Blender 渲染驱动的数据集自进化 Pipeline</text>
  <text x="60" y="105" class="subtitle">一句话：整条链路已经跑通，VLM 自进化也已生效；当前主要瓶颈不是 T2I 或 3D，而是 Blender 打光质量不够稳定。</text>

  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="150" height="42" rx="21" fill="#d9f99d"/>
    <text x="75" y="27" text-anchor="middle" class="legend">绿色：已跑通</text>
    <rect x="175" y="0" width="170" height="42" rx="21" fill="#fde68a"/>
    <text x="260" y="27" text-anchor="middle" class="legend">黄色：正在优化</text>
    <rect x="370" y="0" width="210" height="42" rx="21" fill="#fecaca"/>
    <text x="475" y="27" text-anchor="middle" class="legend">红色：当前主要瓶颈</text>
  </g>

  <text x="60" y="240" class="section">1. 主流程：已经基本打通</text>

  <g filter="url(#shadow)">
    <rect x="60" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="150" y="315" text-anchor="middle" class="boxTitle">Stage 1</text>
    <text x="150" y="345" text-anchor="middle" class="boxText">文本扩写</text>
    <text x="150" y="368" text-anchor="middle" class="small">生成对象 prompt</text>

    <rect x="290" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="380" y="315" text-anchor="middle" class="boxTitle">Stage 2</text>
    <text x="380" y="345" text-anchor="middle" class="boxText">T2I 出图</text>
    <text x="380" y="368" text-anchor="middle" class="small">目标：RGBA + 透明背景</text>

    <rect x="520" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="610" y="315" text-anchor="middle" class="boxTitle">Stage 2.5</text>
    <text x="610" y="345" text-anchor="middle" class="boxText">输入门禁</text>
    <text x="610" y="368" text-anchor="middle" class="small">非 RGBA / 非透明 直接拦截</text>

    <rect x="750" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="840" y="315" text-anchor="middle" class="boxTitle">Stage 3</text>
    <text x="840" y="345" text-anchor="middle" class="boxText">Image to 3D</text>
    <text x="840" y="368" text-anchor="middle" class="small">单图重建 mesh</text>

    <rect x="980" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="1070" y="315" text-anchor="middle" class="boxTitle">Stage 3.5</text>
    <text x="1070" y="345" text-anchor="middle" class="boxText">Mesh 清理</text>
    <text x="1070" y="368" text-anchor="middle" class="small">去伪地板、标准化</text>

    <rect x="1210" y="270" width="180" height="110" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="1300" y="315" text-anchor="middle" class="boxTitle">Stage 5</text>
    <text x="1300" y="345" text-anchor="middle" class="boxText">导出数据集</text>
    <text x="1300" y="368" text-anchor="middle" class="small">metadata / pairs CSV</text>
  </g>

  <line x1="240" y1="325" x2="290" y2="325" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="470" y1="325" x2="520" y2="325" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="700" y1="325" x2="750" y2="325" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="325" x2="980" y2="325" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="60" y="470" class="section">2. 自进化闭环：已经存在并在工作</text>

  <g filter="url(#shadow)">
    <rect x="60" y="500" width="260" height="120" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="190" y="545" text-anchor="middle" class="boxTitle">Stage 4</text>
    <text x="190" y="575" text-anchor="middle" class="boxText">Blender 多视角渲染</text>
    <text x="190" y="600" text-anchor="middle" class="small">mesh -&gt; renders</text>

    <rect x="390" y="500" width="260" height="120" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="520" y="545" text-anchor="middle" class="boxTitle">Stage 5.5</text>
    <text x="520" y="575" text-anchor="middle" class="boxText">VLM 审图 + CV 指标</text>
    <text x="520" y="600" text-anchor="middle" class="small">判断最终渲染图是否可用</text>

    <rect x="720" y="500" width="260" height="120" rx="22" fill="#d9f99d" stroke="#84cc16" stroke-width="2"/>
    <text x="850" y="545" text-anchor="middle" class="boxTitle">Stage 5.6</text>
    <text x="850" y="575" text-anchor="middle" class="boxText">动作反馈</text>
    <text x="850" y="600" text-anchor="middle" class="small">更新 pre_render_control_state</text>

    <rect x="1050" y="500" width="340" height="120" rx="22" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
    <text x="1220" y="545" text-anchor="middle" class="boxTitle">Render Evolution Loop</text>
    <text x="1220" y="575" text-anchor="middle" class="boxText">重渲染 -&gt; 重打分 -&gt; 选 best state</text>
    <text x="1220" y="600" text-anchor="middle" class="small">这一步已能真实运行，不再是纸面方案</text>
  </g>

  <line x1="320" y1="560" x2="390" y2="560" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="650" y1="560" x2="720" y2="560" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="980" y1="560" x2="1050" y2="560" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M 1220 620 C 1220 700, 860 700, 860 628" fill="none" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M 1160 500 C 1160 430, 1160 400, 1160 380" fill="none" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="1160" y1="325" x2="1210" y2="325" stroke="#486581" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="60" y="715" class="section">3. 当前真正卡点：不是前面几步，而是打光质量</text>

  <g filter="url(#shadow)">
    <rect x="60" y="745" width="460" height="165" rx="24" fill="#fecaca" stroke="#ef4444" stroke-width="2.5"/>
    <text x="290" y="790" text-anchor="middle" class="boxTitle">当前主瓶颈</text>
    <text x="100" y="825" class="boxText">• 大多数样本的主要问题都被判成 flat_lighting</text>
    <text x="100" y="853" class="boxText">• 系统多数时候都在调同一类 lighting 动作</text>
    <text x="100" y="881" class="boxText">• 说明真正不稳的是 Blender 打光，而不是 T2I / 3D 主链</text>

    <rect x="570" y="745" width="460" height="165" rx="24" fill="#fde68a" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="800" y="790" text-anchor="middle" class="boxTitle">当前阶段在做什么</text>
    <text x="610" y="825" class="boxText">• 不是从零搭系统</text>
    <text x="610" y="853" class="boxText">• 而是在调“哪种渲染更适合进数据集”</text>
    <text x="610" y="881" class="boxText">• 目标是把 accepted 比例稳定抬高</text>

    <rect x="1080" y="745" width="460" height="165" rx="24" fill="#dbeafe" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="1310" y="790" text-anchor="middle" class="boxTitle">一句话理解现状</text>
    <text x="1120" y="825" class="boxText">系统已经是“能自动生成 + 自动审图 + 自动重渲染”的原型</text>
    <text x="1120" y="853" class="boxText">现在正在解决最后一个最硬的问题：</text>
    <text x="1120" y="881" class="boxText">让渲染质量提升变得稳定，而不是偶尔有效。</text>
  </g>
</svg>
